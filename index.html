<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eloïse & Samuel – 7 Novembre 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #f5ede3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Jost', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .petal {
    position: fixed;
    width: 8px; height: 14px;
    background: #c8744a;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0.6; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  .scene {
    perspective: 1200px;
    width: 360px;
  }

  .envelope-wrap {
    position: relative;
    width: 360px;
    height: 260px;
    cursor: pointer;
  }

  .envelope {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
  }

  .env-body {
    position: absolute;
    inset: 0;
    background: #fdf6ee;
    border-radius: 4px;
    border: 1px solid #d9a88a;
    overflow: hidden;
  }

  .env-body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, #f0d9c8 0%, transparent 45%),
      linear-gradient(225deg, #f0d9c8 0%, transparent 45%);
  }

  .env-flap-bottom {
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 0;
    border-left: 180px solid transparent;
    border-right: 180px solid transparent;
    border-bottom: 130px solid #e8c9b0;
    filter: drop-shadow(0 -2px 4px rgba(0,0,0,0.06));
  }

  /* Logo sceau */
  .seal {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 90px;
    z-index: 10;
    transition: transform 0.3s;
    cursor: pointer;
  }
  .seal img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15));
  }
  .envelope-wrap:hover .seal {
    transform: translateX(-50%) scale(1.05);
  }

  /* Rabat supérieur */
  .env-flap-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 140px;
    transform-origin: top center;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.4,0,0.2,1);
    z-index: 5;
  }

  .env-flap-top .flap-shape {
    position: absolute;
    inset: 0;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    border: 1px solid #d9a88a;
    background: linear-gradient(180deg, #fdf6ee 0%, #f5e6d6 100%);
  }

  .env-flap-top .flap-shadow {
    position: absolute;
    inset: 0;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.08) 100%);
  }

  .opened .env-flap-top {
    transform: rotateX(-180deg);
  }

  /* Faire-part dans l'enveloppe */
  .card {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    bottom: 20px;
    z-index: 3;
    transition: bottom 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.6s ease;
    opacity: 0;
    border-radius: 3px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    overflow: hidden;
    cursor: zoom-in;
  }

  .card img {
    width: 100%;
    display: block;
    pointer-events: none;
  }

  .opened .card {
    bottom: 310px;
    opacity: 1;
  }

  /* Hint */
  .hint {
    text-align: center;
    margin-top: 24px;
    color: #a85930;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: opacity 0.4s;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
  .hint.hidden { opacity: 0 !important; pointer-events: none; animation: none; }

  /* Hint zoom (après ouverture) */
  .hint-zoom {
    text-align: center;
    margin-top: 24px;
    color: #a85930;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.8s ease 1.4s;
    animation: none;
  }
  .hint-zoom.visible {
    opacity: 0.8;
    animation: pulse 2s ease-in-out infinite;
  }

  .names {
    text-align: center;
    margin-bottom: 20px;
    font-family: 'Cormorant Garamond', serif;
    color: #8a4020;
    font-size: 32px;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 1px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
  }
  .names.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .date {
    text-align: center;
    margin-top: 8px;
    font-family: 'Jost', sans-serif;
    color: #a85930;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 1s ease 1.2s;
  }
  .date.visible { opacity: 1; }

  /* ---- LIGHTBOX ---- */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30, 15, 5, 0.88);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
    animation: fadeIn 0.3s ease;
  }
  .lightbox.active { display: flex; }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: zoomIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }
  @keyframes zoomIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .lightbox-close {
    position: fixed;
    top: 20px; right: 28px;
    color: #fdf6ee;
    font-size: 36px;
    cursor: pointer;
    line-height: 1;
    opacity: 0.8;
    transition: opacity 0.2s;
    font-weight: 300;
    font-family: sans-serif;
  }
  .lightbox-close:hover { opacity: 1; }
</style>
</head>
<body>

<div id="petals"></div>

<div class="scene">
  <div class="names" id="names">Eloïse &amp; Samuel</div>

  <div class="envelope-wrap" id="envWrap" onclick="openEnvelope()">
    <div class="envelope" id="env">
      <div class="env-body"></div>
      <div class="env-flap-bottom"></div>

      <div class="card" id="card" onclick="openLightbox(event)">
        <img id="inviteImg" alt="Faire-part Eloïse & Samuel" />
      </div>

      <div class="seal">
        <img id="sealImg" alt="Logo Eloïse & Samuel" />
      </div>

      <div class="env-flap-top" id="flap">
        <div class="flap-shadow"></div>
        <div class="flap-shape"></div>
      </div>
    </div>
  </div>

  <div class="hint" id="hint">✦ cliquez pour ouvrir ✦</div>
  <div class="hint-zoom" id="hintZoom">✦ cliquez sur le faire-part pour agrandir ✦</div>
  <div class="date" id="date">7 · Novembre · 2026</div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">×</span>
  <img id="lightboxImg" alt="Faire-part agrandi" />
</div>

  // Pétales
  const petalsContainer = document.getElementById('petals');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (4 + Math.random() * 6) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.opacity = 0.3 + Math.random() * 0.4;
    p.style.transform = `scale(${0.5 + Math.random()}) rotate(${Math.random()*60}deg)`;
    petalsContainer.appendChild(p);
  }

  let opened = false;

  function openEnvelope() {
    if (opened) return;
    opened = true;
    document.getElementById('env').classList.add('opened');
    document.getElementById('hint').classList.add('hidden');
    setTimeout(() => {
      document.getElementById('names').classList.add('visible');
      document.getElementById('date').classList.add('visible');
      document.getElementById('hintZoom').classList.add('visible');
    }, 600);
  }

  function openLightbox(e) {
    if (!opened) return;
    e.stopPropagation();
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
  });
